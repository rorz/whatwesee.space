name: Daily artwork

on:
  schedule:
    # 07:00 UTC ≈ 08:00 London in BST (Mar–Oct), 07:00 in GMT (Nov–Feb).
    # We accept ±1hr drift across DST rather than running two gated crons.
    - cron: "0 7 * * *"
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened, labeled, ready_for_review]

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  summon:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Compute London date
        id: date
        run: echo "date=$(TZ=Europe/London date +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Create issue for Copilot
        env:
          GH_TOKEN: ${{ secrets.RUNNER_PAT }}
          DAILY_DATE: ${{ steps.date.outputs.date }}
        run: |
          gh issue create \
            --title "daily: admit the guest for $DAILY_DATE" \
            --label "daily-artwork" \
            --assignee "@copilot" \
            --body "$(cat <<EOF
          The Guest Wing is awaiting today's admission.

          Follow the prompt at [\`.github/prompts/new-daily-artwork.prompt.md\`](.github/prompts/new-daily-artwork.prompt.md) step-by-step. Read the contract at [\`.github/instructions/daily-artwork.instructions.md\`](.github/instructions/daily-artwork.instructions.md) first.

          Open a PR from a branch named \`copilot/daily-admit-guest-$DAILY_DATE\` with label \`daily-artwork\` when complete. The verify job on this workflow will run lint, typecheck, and build, and auto-merge on green.

          Today's date (Europe/London): $DAILY_DATE.
          EOF
          )"

  verify:
    if: |
      github.event_name == 'pull_request'
      && github.event.pull_request.draft == false
      && (contains(github.event.pull_request.labels.*.name, 'daily-artwork')
          || (startsWith(github.event.pull_request.head.ref, 'copilot/')
              && (contains(github.event.pull_request.head.ref, 'admit-guest-')
                  || contains(github.event.pull_request.head.ref, 'daily-artwork'))))
    runs-on: ubuntu-latest
    # Expose the exact commit verify validated so auto-merge can pin to it.
    outputs:
      head: ${{ steps.base.outputs.head }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Check out the PR's LIVE head, not the triggering event's SHA.
          # Stale/early events (notably Copilot's empty "Initial plan" commit)
          # otherwise make verify evaluate the wrong tree and falsely fail
          # with "no file changes".
          ref: refs/pull/${{ github.event.pull_request.number }}/head
          fetch-depth: 0

      - name: Compute diff base
        id: base
        run: |
          set -euo pipefail

          # Diff against the merge-base with main, not the event payload's
          # base.sha, so the validator sees exactly this PR's added files
          # regardless of which event triggered the run or any rebases.
          git fetch --no-tags origin main
          base="$(git merge-base FETCH_HEAD HEAD)"
          head="$(git rev-parse HEAD)"
          echo "base=$base" >> "$GITHUB_OUTPUT"
          echo "head=$head" >> "$GITHUB_OUTPUT"
          echo "Validating $base..$head"

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Validate daily artwork payload + diversity
        env:
          BASE_SHA: ${{ steps.base.outputs.base }}
          HEAD_SHA: ${{ steps.base.outputs.head }}
        run: node scripts/validate-daily-artwork.mjs

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint

      - run: pnpm exec tsc --noEmit

      - run: pnpm build

  auto-merge:
    needs: verify
    if: |
      github.event_name == 'pull_request'
      && github.event.pull_request.draft == false
      && (github.event.pull_request.user.type == 'Bot'
          || startsWith(github.event.pull_request.head.ref, 'copilot/'))
      && (contains(github.event.pull_request.labels.*.name, 'daily-artwork')
          || (startsWith(github.event.pull_request.head.ref, 'copilot/')
              && (contains(github.event.pull_request.head.ref, 'admit-guest-')
                  || contains(github.event.pull_request.head.ref, 'daily-artwork'))))
    runs-on: ubuntu-latest
    steps:
      - name: Label, merge, and close the admission issue
        env:
          # github.token has contents+pull-requests+issues: write via the
          # top-level permissions block — enough to merge, label, and close.
          GH_TOKEN: ${{ github.token }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          # Pin to the exact commit the verify job validated (its live PR head),
          # never the triggering event's SHA, so we can't merge unverified work.
          EXPECTED_HEAD_SHA: ${{ needs.verify.outputs.head }}
          HAS_LABEL: ${{ contains(github.event.pull_request.labels.*.name, 'daily-artwork') }}
        run: |
          set -euo pipefail

          # 1. Apply label if missing.
          if [ "$HAS_LABEL" != "true" ]; then
            gh pr edit "$PR_URL" --add-label "daily-artwork"
          fi

          # 2. Bail if the live head moved past what verify validated; the run
          #    triggered by that newer commit will verify and merge it instead.
          current_head_sha="$(gh pr view "$PR_URL" --json headRefOid --jq '.headRefOid')"
          if [ "$current_head_sha" != "$EXPECTED_HEAD_SHA" ]; then
            echo "::notice::PR head moved to $current_head_sha after verify ran on $EXPECTED_HEAD_SHA. A newer run will handle it."
            exit 0
          fi

          # 3. Resolve the admission issue BEFORE merging (PR data is fully
          #    available pre-merge). Prefer the linked closing reference; fall
          #    back to the open daily-artwork issue for this date.
          issue="$(gh pr view "$PR_URL" --json closingIssuesReferences --jq '.closingIssuesReferences[0].number // empty')"
          if [ -z "$issue" ]; then
            daily_date="$(printf '%s' "$HEAD_REF" | grep -Eo '[0-9]{4}-[0-9]{2}-[0-9]{2}' | head -n 1 || true)"
            if [ -n "$daily_date" ]; then
              # `gh issue list --label`/`--search` is unreliable here; filter the
              # REST list with jq for the labelled issue matching this date.
              issue="$(gh issue list --state open --limit 100 --json number,title,labels \
                | jq -r --arg d "$daily_date" '[.[] | select(any(.labels[]; .name == "daily-artwork") and (.title | contains($d)))][0].number // empty')"
            fi
          fi

          # 4. Squash-merge directly. verify (a needs dependency) is green and
          #    there are no required status checks, so a synchronous merge is
          #    deterministic — which lets the issue close below run reliably.
          gh pr merge "$PR_URL" --squash --delete-branch --match-head-commit "$EXPECTED_HEAD_SHA"

          # 5. Close the issue explicitly. GitHub suppresses `Closes #N` keyword
          #    auto-close when the merge is performed by GITHUB_TOKEN, so the
          #    pipeline must close it itself.
          if [ -n "$issue" ]; then
            gh issue close "$issue" --reason completed \
              --comment "Admitted to the Guest Wing via #${PR_NUMBER} (merged). Closed automatically by the daily-artwork workflow."
            echo "Closed issue #$issue."
          else
            echo "::warning::No daily-artwork issue resolved for $PR_URL; the watchdog reconciliation sweep will catch it."
          fi
