name: Daily artwork

on:
  schedule:
    # 07:00 UTC ≈ 08:00 London in BST (Mar–Oct), 07:00 in GMT (Nov–Feb).
    # We accept ±1hr drift across DST rather than running two gated crons.
    - cron: "0 7 * * *"
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened, labeled, ready_for_review]

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  summon:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Compute London date
        id: date
        run: echo "date=$(TZ=Europe/London date +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch world seed
        id: seed
        # The Copilot agent runs behind a firewall that blocks Wikipedia / HN /
        # Open Library, so it can never fetch real-world inspiration itself and
        # silently falls back to its own priors (the cause of samey output). We
        # fetch it HERE, where Actions has full internet, and bake it into the
        # issue. Resilient: never fail the job; a dud source just goes blank.
        run: |
          set -uo pipefail

          wiki="$(curl -fsSL --max-time 20 https://en.wikipedia.org/api/rest_v1/page/random/summary 2>/dev/null || true)"
          wiki_title="$(printf '%s' "$wiki" | jq -r '.title // empty' 2>/dev/null || true)"
          wiki_extract="$(printf '%s' "$wiki" | jq -r '(.extract // "") | .[0:500]' 2>/dev/null || true)"

          hn="$(curl -fsSL --max-time 20 "https://hn.algolia.com/api/v1/search?tags=front_page&hitsPerPage=15" 2>/dev/null || true)"
          hn_titles="$(printf '%s' "$hn" | jq -r '[.hits[].title] | map(select(. != null)) | .[0:8] | map("- " + .) | join("\n")' 2>/dev/null || true)"

          ol="$(curl -fsSL --max-time 20 "https://openlibrary.org/trending/daily.json?limit=25" 2>/dev/null || true)"
          ol_n="$(printf '%s' "$ol" | jq -r '.works | length' 2>/dev/null || echo 0)"
          book=""
          if [ "${ol_n:-0}" -gt 0 ]; then
            ol_idx=$(( RANDOM % ol_n ))
            book="$(printf '%s' "$ol" | jq -r --argjson i "$ol_idx" '.works[$i] | [(.title // "untitled"), (if .author_name then "by " + .author_name[0] else "" end), (if .first_publish_year then "(" + (.first_publish_year|tostring) + ")" else "" end)] | map(select(. != "")) | join(" ")' 2>/dev/null || true)"
          fi

          echo "Fetched world seed: wiki='${wiki_title:-<none>}' book='${book:-<none>}' hn=$(printf '%s' "$hn_titles" | grep -c '^-' || echo 0) headlines"
          {
            echo "wiki_title<<SEED_EOF"; echo "${wiki_title:-(Wikipedia unavailable)}"; echo "SEED_EOF"
            echo "wiki_extract<<SEED_EOF"; echo "${wiki_extract:-}"; echo "SEED_EOF"
            echo "book<<SEED_EOF"; echo "${book:-(Open Library unavailable)}"; echo "SEED_EOF"
            echo "hn_titles<<SEED_EOF"; echo "${hn_titles:-(Hacker News unavailable)}"; echo "SEED_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create issue for Copilot
        env:
          GH_TOKEN: ${{ secrets.RUNNER_PAT }}
          DAILY_DATE: ${{ steps.date.outputs.date }}
          WIKI_TITLE: ${{ steps.seed.outputs.wiki_title }}
          WIKI_EXTRACT: ${{ steps.seed.outputs.wiki_extract }}
          BOOK: ${{ steps.seed.outputs.book }}
          HN_TITLES: ${{ steps.seed.outputs.hn_titles }}
        run: |
          set -euo pipefail

          # Build the body in a file (not via shell interpolation) so fetched
          # text with quotes/markdown can't break the command or inject anything.
          {
            echo "The Guest Wing is awaiting today's admission."
            echo
            echo "## Today's world seed — fetched from the real world; build from THIS"
            echo
            echo "Your premise must grow from the material below. Do **not** discard it for a tidier idea from your own head, and do **not** invent your own facts — these are real. Pick the single fragment that is strangest or most alive and let it set the subject."
            echo
            echo "**Random encyclopedia subject:** ${WIKI_TITLE}"
            if [ -n "${WIKI_EXTRACT}" ]; then echo; echo "> ${WIKI_EXTRACT}"; fi
            echo
            echo "**Random book:** ${BOOK}"
            echo
            echo "**Today's Hacker News front page:**"
            echo
            echo "${HN_TITLES}"
            echo
            echo "Record the fragment you chose verbatim in \`profile.inspiration\` (the \`source=\` / \`premise=\` seed trace)."
            echo
            echo "---"
            echo
            echo "Follow the prompt at [\`.github/prompts/new-daily-artwork.prompt.md\`](.github/prompts/new-daily-artwork.prompt.md) step-by-step. Read the contract at [\`.github/instructions/daily-artwork.instructions.md\`](.github/instructions/daily-artwork.instructions.md) first — especially the **banned house style**."
            echo
            echo "Open a PR from a branch named \`copilot/daily-admit-guest-${DAILY_DATE}\` with label \`daily-artwork\` when complete. The verify job on this workflow will run lint, typecheck, and build, and auto-merge on green."
            echo
            echo "Today's date (Europe/London): ${DAILY_DATE}."
          } > /tmp/daily-issue-body.md

          gh issue create \
            --title "daily: admit the guest for $DAILY_DATE" \
            --label "daily-artwork" \
            --assignee "@copilot" \
            --body-file /tmp/daily-issue-body.md

  verify:
    if: |
      github.event_name == 'pull_request'
      && github.event.pull_request.draft == false
      && (contains(github.event.pull_request.labels.*.name, 'daily-artwork')
          || (startsWith(github.event.pull_request.head.ref, 'copilot/')
              && (contains(github.event.pull_request.head.ref, 'admit-guest-')
                  || contains(github.event.pull_request.head.ref, 'daily-artwork'))))
    runs-on: ubuntu-latest
    # Expose the exact commit verify validated so auto-merge can pin to it.
    outputs:
      head: ${{ steps.base.outputs.head }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Check out the PR's LIVE head, not the triggering event's SHA.
          # Stale/early events (notably Copilot's empty "Initial plan" commit)
          # otherwise make verify evaluate the wrong tree and falsely fail
          # with "no file changes".
          ref: refs/pull/${{ github.event.pull_request.number }}/head
          fetch-depth: 0

      - name: Compute diff base
        id: base
        run: |
          set -euo pipefail

          # Diff against the merge-base with main, not the event payload's
          # base.sha, so the validator sees exactly this PR's added files
          # regardless of which event triggered the run or any rebases.
          git fetch --no-tags origin main
          base="$(git merge-base FETCH_HEAD HEAD)"
          head="$(git rev-parse HEAD)"
          echo "base=$base" >> "$GITHUB_OUTPUT"
          echo "head=$head" >> "$GITHUB_OUTPUT"
          echo "Validating $base..$head"

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Validate daily artwork payload + diversity
        env:
          BASE_SHA: ${{ steps.base.outputs.base }}
          HEAD_SHA: ${{ steps.base.outputs.head }}
        run: node scripts/validate-daily-artwork.mjs

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint

      - run: pnpm exec tsc --noEmit

      - run: pnpm build

  auto-merge:
    needs: verify
    if: |
      github.event_name == 'pull_request'
      && github.event.pull_request.draft == false
      && (github.event.pull_request.user.type == 'Bot'
          || startsWith(github.event.pull_request.head.ref, 'copilot/'))
      && (contains(github.event.pull_request.labels.*.name, 'daily-artwork')
          || (startsWith(github.event.pull_request.head.ref, 'copilot/')
              && (contains(github.event.pull_request.head.ref, 'admit-guest-')
                  || contains(github.event.pull_request.head.ref, 'daily-artwork'))))
    runs-on: ubuntu-latest
    steps:
      - name: Label, merge, and close the admission issue
        env:
          # github.token has contents+pull-requests+issues: write via the
          # top-level permissions block — enough to merge, label, and close.
          GH_TOKEN: ${{ github.token }}
          # This job has no checkout. GH_REPO lets every gh command resolve the
          # repo without a local git clone (gh otherwise reads it from git).
          GH_REPO: ${{ github.repository }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          # Pin to the exact commit the verify job validated (its live PR head),
          # never the triggering event's SHA, so we can't merge unverified work.
          EXPECTED_HEAD_SHA: ${{ needs.verify.outputs.head }}
          HAS_LABEL: ${{ contains(github.event.pull_request.labels.*.name, 'daily-artwork') }}
        run: |
          set -euo pipefail

          # 1. Apply label if missing.
          if [ "$HAS_LABEL" != "true" ]; then
            gh pr edit "$PR_URL" --add-label "daily-artwork"
          fi

          # 2. Bail if the live head moved past what verify validated; the run
          #    triggered by that newer commit will verify and merge it instead.
          current_head_sha="$(gh pr view "$PR_URL" --json headRefOid --jq '.headRefOid')"
          if [ "$current_head_sha" != "$EXPECTED_HEAD_SHA" ]; then
            echo "::notice::PR head moved to $current_head_sha after verify ran on $EXPECTED_HEAD_SHA. A newer run will handle it."
            exit 0
          fi

          # 3. Resolve the admission issue BEFORE merging (PR data is fully
          #    available pre-merge). Prefer the linked closing reference; fall
          #    back to the open daily-artwork issue for this date.
          issue="$(gh pr view "$PR_URL" --json closingIssuesReferences --jq '.closingIssuesReferences[0].number // empty')"
          if [ -z "$issue" ]; then
            daily_date="$(printf '%s' "$HEAD_REF" | grep -Eo '[0-9]{4}-[0-9]{2}-[0-9]{2}' | head -n 1 || true)"
            if [ -n "$daily_date" ]; then
              # `gh issue list --label`/`--search` is unreliable here; filter the
              # REST list with jq for the labelled issue matching this date.
              issue="$(gh issue list --state open --limit 100 --json number,title,labels \
                | jq -r --arg d "$daily_date" '[.[] | select(any(.labels[]; .name == "daily-artwork") and (.title | contains($d)))][0].number // empty')"
            fi
          fi

          # 4. Merge via the REST API — NOT `gh pr merge`, which shells out to
          #    local git (even without --delete-branch) and dies with "not a git
          #    repository" in this checkout-less job, after the merge, skipping
          #    the close. `sha` guards against the head moving since verify;
          #    delete_branch_on_merge removes the branch. Tolerate losing a race
          #    to another run that already merged this PR.
          if ! gh api --method PUT "repos/${GH_REPO}/pulls/${PR_NUMBER}/merge" \
                 -f merge_method=squash -f sha="$EXPECTED_HEAD_SHA" 2>/tmp/merge_err; then
            state="$(gh pr view "$PR_URL" --json state --jq '.state' 2>/dev/null || echo UNKNOWN)"
            if [ "$state" != "MERGED" ]; then
              cat /tmp/merge_err >&2
              echo "::error::Merge failed and PR #${PR_NUMBER} is not merged (state=$state)."
              exit 1
            fi
            echo "PR #${PR_NUMBER} already merged by another run; continuing to close."
          fi

          # 5. Close the issue explicitly — GitHub suppresses `Closes #N`
          #    auto-close on GITHUB_TOKEN merges. Non-fatal: the watchdog
          #    close-merged-issues sweep is the backstop.
          if [ -n "$issue" ]; then
            if gh issue close "$issue" --reason completed \
                 --comment "Admitted to the Guest Wing via #${PR_NUMBER} (merged). Closed automatically by the daily-artwork workflow."; then
              echo "Closed issue #$issue."
            else
              echo "::warning::Could not close issue #$issue; the watchdog sweep will catch it."
            fi
          else
            echo "::warning::No daily-artwork issue resolved for $PR_URL; the watchdog reconciliation sweep will catch it."
          fi
