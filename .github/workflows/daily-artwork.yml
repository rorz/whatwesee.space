name: Daily artwork

on:
  schedule:
    - cron: "0 7 * * *"
    - cron: "0 8 * * *"
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened, labeled]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  summon:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Gate to 08:00 Europe/London
        id: gate
        run: |
          HOUR_LONDON=$(TZ=Europe/London date +%H)
          DATE_LONDON=$(TZ=Europe/London date +%Y-%m-%d)
          echo "hour=$HOUR_LONDON" >> "$GITHUB_OUTPUT"
          echo "date=$DATE_LONDON" >> "$GITHUB_OUTPUT"
          if [ "$HOUR_LONDON" = "08" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "proceed=true" >> "$GITHUB_OUTPUT"
          else
            echo "proceed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.gate.outputs.proceed == 'true'
        uses: actions/checkout@v4

      - name: Create issue for Copilot
        if: steps.gate.outputs.proceed == 'true'
        env:
          GH_TOKEN: ${{ secrets.RUNNER_PAT }}
          DAILY_DATE: ${{ steps.gate.outputs.date }}
        run: |
          gh issue create \
            --title "daily: admit the guest for $DAILY_DATE" \
            --label "daily-artwork" \
            --assignee "@copilot" \
            --body "$(cat <<'EOF'
          The Guest Wing is awaiting today's admission.

          Follow the prompt at [`.github/prompts/new-daily-artwork.prompt.md`](.github/prompts/new-daily-artwork.prompt.md) step-by-step. Read the contract at [`.github/instructions/daily-artwork.instructions.md`](.github/instructions/daily-artwork.instructions.md) first.

          Open a PR with label `daily-artwork` when complete. The verify job on this workflow will run lint, typecheck, and build, and auto-merge on green.

          Today's date (Europe/London): $DAILY_DATE.
          EOF
          )"

  verify:
    if: github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'daily-artwork')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint

      - run: pnpm exec tsc --noEmit

      - run: pnpm build

  auto-merge:
    needs: verify
    if: github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'daily-artwork') && github.event.pull_request.user.login == 'github-actions[bot]' || github.event.pull_request.user.type == 'Bot'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Squash and merge
        env:
          GH_TOKEN: ${{ secrets.RUNNER_PAT }}
        run: |
          gh pr merge ${{ github.event.pull_request.number }} \
            --squash \
            --delete-branch
