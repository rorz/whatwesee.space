name: Daily artwork

on:
  schedule:
    # 07:00 UTC ≈ 08:00 London in BST (Mar–Oct), 07:00 in GMT (Nov–Feb).
    # We accept ±1hr drift across DST rather than running two gated crons.
    - cron: "0 7 * * *"
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened, labeled, ready_for_review]

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  summon:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Compute London date
        id: date
        run: echo "date=$(TZ=Europe/London date +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Create issue for Copilot
        env:
          GH_TOKEN: ${{ secrets.RUNNER_PAT }}
          DAILY_DATE: ${{ steps.date.outputs.date }}
        run: |
          gh issue create \
            --title "daily: admit the guest for $DAILY_DATE" \
            --label "daily-artwork" \
            --assignee "@copilot" \
            --body "$(cat <<EOF
          The Guest Wing is awaiting today's admission.

          Follow the prompt at [\`.github/prompts/new-daily-artwork.prompt.md\`](.github/prompts/new-daily-artwork.prompt.md) step-by-step. Read the contract at [\`.github/instructions/daily-artwork.instructions.md\`](.github/instructions/daily-artwork.instructions.md) first.

          Open a PR from a branch named \`copilot/daily-admit-guest-$DAILY_DATE\` with label \`daily-artwork\` when complete. The verify job on this workflow will run lint, typecheck, and build, and auto-merge on green.

          Today's date (Europe/London): $DAILY_DATE.
          EOF
          )"

  verify:
    if: |
      github.event_name == 'pull_request'
      && github.event.pull_request.draft == false
      && (contains(github.event.pull_request.labels.*.name, 'daily-artwork')
          || (startsWith(github.event.pull_request.head.ref, 'copilot/')
              && (contains(github.event.pull_request.head.ref, 'admit-guest-')
                  || contains(github.event.pull_request.head.ref, 'daily-artwork'))))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Validate daily artwork payload
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          git cat-file -e "$BASE_SHA^{commit}" 2>/dev/null || git fetch --no-tags origin "$BASE_SHA"

          changed_files="$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")"
          if [ -z "$changed_files" ]; then
            echo "::error::Daily artwork PR has no file changes."
            exit 1
          fi

          if ! printf '%s\n' "$changed_files" | grep -Fxq "app/daily/_lib/daily-registry.ts"; then
            echo "::error::Daily artwork PR must update app/daily/_lib/daily-registry.ts."
            exit 1
          fi

          artwork_dirs="$(git diff --diff-filter=A --name-only "$BASE_SHA" "$HEAD_SHA" \
            | awk -F/ '$1 == "app" && $2 == "daily" && $3 == "_artworks" && $4 ~ /^[0-9][0-9][0-9][0-9]-[0-9][0-9]-[0-9][0-9]-.+/ { print $1 "/" $2 "/" $3 "/" $4 }' \
            | sort -u)"
          artwork_dir_count="$(printf '%s\n' "$artwork_dirs" | sed '/^$/d' | wc -l | tr -d ' ')"

          if [ "$artwork_dir_count" -ne 1 ]; then
            echo "::error::Daily artwork PR must add exactly one app/daily/_artworks/<date>-<slug>/ folder."
            printf 'Detected folders:\n%s\n' "$artwork_dirs"
            exit 1
          fi

          artwork_dir="$(printf '%s\n' "$artwork_dirs" | sed '/^$/d' | head -n 1)"
          for required_file in artwork.tsx index.ts profile.ts thumb.webp; do
            if ! git diff --diff-filter=A --name-only "$BASE_SHA" "$HEAD_SHA" -- "$artwork_dir/$required_file" | grep -Fxq "$artwork_dir/$required_file"; then
              echo "::error::Daily artwork PR must add $artwork_dir/$required_file."
              exit 1
            fi
          done

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint

      - run: pnpm exec tsc --noEmit

      - run: pnpm build

  auto-merge:
    needs: verify
    if: |
      github.event_name == 'pull_request'
      && github.event.pull_request.draft == false
      && github.event.pull_request.user.type == 'Bot'
      && (contains(github.event.pull_request.labels.*.name, 'daily-artwork')
          || (startsWith(github.event.pull_request.head.ref, 'copilot/')
              && (contains(github.event.pull_request.head.ref, 'admit-guest-')
                  || contains(github.event.pull_request.head.ref, 'daily-artwork'))))
    runs-on: ubuntu-latest
    steps:
      - name: Label and merge verified artwork
        env:
          # GITHUB_TOKEN has pull-requests: write via the top-level permissions
          # block. RUNNER_PAT is the user PAT used for issue assignment; it
          # currently lacks PR-write scope, so we use github.token here.
          GH_TOKEN: ${{ github.token }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          EXPECTED_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          HAS_LABEL: ${{ contains(github.event.pull_request.labels.*.name, 'daily-artwork') }}
        run: |
          set -euo pipefail

          # 1. Apply label if missing (cheap, always works with github.token).
          if [ "$HAS_LABEL" != "true" ]; then
            gh pr edit "$PR_URL" --add-label "daily-artwork"
          fi

          current_head_sha="$(gh pr view "$PR_URL" --json headRefOid --jq '.headRefOid')"
          if [ "$current_head_sha" != "$EXPECTED_HEAD_SHA" ]; then
            echo "::notice::PR head moved from $EXPECTED_HEAD_SHA to $current_head_sha after this run started. A newer workflow run will handle it."
            exit 0
          fi

          # 2. Enable native GitHub auto-merge so the squash fires the moment
          #    the PR is ready + checks are green. Requires Settings → General
          #    → "Allow auto-merge" to be on. Fall back to a direct squash
          #    merge after the verify job has passed.
          if ! gh pr merge "$PR_URL" --auto --squash --delete-branch --match-head-commit "$EXPECTED_HEAD_SHA"; then
            gh pr merge "$PR_URL" --squash --delete-branch --match-head-commit "$EXPECTED_HEAD_SHA"
          fi
